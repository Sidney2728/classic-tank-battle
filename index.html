<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>经典坦克大战</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="game-panel">
        <header class="hero">
          <p class="eyebrow">Battle City Tribute</p>
          <h1>经典坦克大战</h1>
          <p class="subtitle">
            守住基地，击败所有敌军。方向键移动，空格发射，R 重新开始。
          </p>
        </header>

        <div class="play-area">
          <canvas id="game" width="832" height="832" aria-label="坦克大战游戏画面"></canvas>
          <aside class="hud">
            <div class="card">
              <h2>战场信息</h2>
              <p><span>生命</span><strong id="lives">3</strong></p>
              <p><span>敌军</span><strong id="enemies">12</strong></p>
              <p><span>得分</span><strong id="score">0</strong></p>
              <p><span>关卡</span><strong id="level">1</strong></p>
            </div>

            <div class="card">
              <h2>操作说明</h2>
              <p>↑ ↓ ← →：移动</p>
              <p>空格：发射子弹</p>
              <p>R：重新开局</p>
            </div>

            <div class="card">
              <h2>目标</h2>
              <p>保护下方基地不被摧毁。</p>
              <p>消灭全部敌军即可获胜。</p>
            </div>
          </aside>
        </div>

        <p id="message" class="message">准备战斗</p>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
